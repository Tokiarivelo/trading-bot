# Dev stack for the Linux-native services.
# The MT5 gateway is NOT here: it needs a Windows environment (Wine or a
# Windows VPS) with a running MT5 terminal — see gateway/README.md.
services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./configs:/app/configs:ro
      - ./data:/app/data
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000

  frontend:
    image: node:24-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
