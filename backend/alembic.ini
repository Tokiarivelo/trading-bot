[alembic]
script_location = migrations
prepend_sys_path = .
# URL is taken from Settings (TB_DATABASE_URL / .env) in migrations/env.py;
# this value is a fallback for local dev.
sqlalchemy.url = sqlite:///./data/trading.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
