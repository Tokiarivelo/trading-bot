# BTCUSD — 24/7 market; session windows cover the most liquid hours.
symbol: BTCUSD
max_spread_points: 2500      # broker-dependent; calibrate against your broker in Phase 1
min_rr: 1.5
sessions:
  - { start: "08:00", end: "22:00" }
default_skill: normal/btcusd
# Static broker facts — see xauusd.yaml comment. Calibrate against your broker.
contract_size: 1               # 1 BTC per lot
point: 0.01
digits: 2
stops_level: 0
volume_min: 0.01
volume_max: 20
volume_step: 0.01
