# Volatility 75 Index — synthetic index (Deriv).
# PLACEHOLDER VALUES below (point/digits/stops_level/contract_size/volume_*) —
# these are typical Deriv defaults, NOT pulled from your broker's MT5
# symbol_info. Verify each one against your actual MT5 terminal
# (right-click symbol -> Specification) before trusting any live/real-money
# position sizing off this file. Same caveat as configs/symbols/xauusd.yaml.
symbol: "Volatility 75 Index"
max_spread_points: 3000      # PLACEHOLDER — calibrate against your broker
min_rr: 1.5
sessions:
  - { start: "00:00", end: "23:59" }
default_skill: normal/generic
# Static broker facts — PLACEHOLDER, confirm against MT5 symbol_info.
contract_size: 1.0
point: 0.01
digits: 2
stops_level: 0
volume_min: 0.01
volume_max: 100.0
volume_step: 0.01
