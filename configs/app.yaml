# Global app configuration. Hot-reloadable.
mode: live # paper | live  — NEVER switch to live before Phase 9 criteria
timezone: 'Indian/Antananarivo'
symbols: [XAUUSD, XAGUSD, BTCUSD, 'Boom 1000 Index', 'Volatility 75 Index']
engine:
  enabled: true
  entry_timeframe: M5
  # HTF veto is per-bot now: each bot is vetoed by the single timeframe
  # immediately above its own strategy's entry_timeframe (see
  # src/engine/application/trade_loop.py:_veto_timeframe) — no engine-wide
  # list to configure here anymore.
